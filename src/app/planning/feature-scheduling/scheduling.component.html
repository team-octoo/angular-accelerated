<h2>Scheduling</h2>

@if (isLoading$ | async) {
    <p>Loading data...</p>
} @else {
    @for(task of (planning$ | async)?.plannedTasks; track task.id) {
        <app-planning-task-item [task]="task"></app-planning-task-item>
    }

    @for(task of (planning$ | async)?.executedTasks; track task.id) {
        <app-planning-task-item [task]="task"></app-planning-task-item>
    }
}
